<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Spark & Grow — Printables for School-Age Kids</title>
<meta name="description" content="Fun, educational printables for parents of kids aged 6–12. Chore charts, planners, activity kits. Instant download."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#FFD166;
  --teal:#06D6A0;
  --coral:#EF6B50;
  --ink:#110C15;
  --offwhite:#FAFAF8;
  --card:#F4F1F0;
  --muted:#887E86;
  --white:#ffffff;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--offwhite);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 64px;height:72px;
  background:var(--offwhite);
  border-bottom:2px solid var(--yellow);
}
.logo{font-size:1.25rem;font-weight:900;letter-spacing:-0.5px;color:var(--ink)}
.logo span{color:var(--coral)}
.nav-cta{
  background:var(--coral);color:var(--white);
  font-weight:700;font-size:.875rem;
  padding:.625rem 1.5rem;border-radius:999px;
  text-decoration:none;transition:opacity .15s,transform .15s;
  white-space:nowrap;
}
.nav-cta:hover{opacity:.88;transform:translateY(-1px)}
